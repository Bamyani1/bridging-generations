title: School meal program
summary: A hot meal every school day for all 156 students — so hunger never pulls a child out of the classroom.
body: |-
  The school meal program covers a hot, balanced midday meal for every student across our five partner schools. Without it, attendance falls during the lean season and students drop out mid-term to work alongside parents. With it, the classroom stays full year-round.
