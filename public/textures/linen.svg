<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <pattern id="warp" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse">
      <line x1="0" y1="14" x2="14" y2="0" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1"/>
    </pattern>
    <pattern id="weft" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="14" y2="14" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#warp)"/>
